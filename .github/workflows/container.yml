name: Build and publish runtime

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  statuses: write

concurrency:
  group: runtime-${{ github.ref }}
  cancel-in-progress: true

env:
  LOCAL_IMAGE: palworld-umu-runtime:test-${{ github.sha }}

jobs:
  container:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/latukatv/palworld-umu-runtime
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Build local linux/amd64 candidate
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.LOCAL_IMAGE }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Run candidate image preflight
        shell: bash
        run: |
          set -Eeuo pipefail
          log_file="${RUNNER_TEMP}/palworld-umu-image-preflight.log"
          set +e
          docker run --rm \
            --entrypoint /usr/local/bin/palworld-umu-image-preflight \
            "${LOCAL_IMAGE}" 2>&1 | tee "${log_file}"
          rc=${PIPESTATUS[0]}
          set -e
          {
            echo '## Candidate image preflight'
            echo
            echo '```text'
            cat "${log_file}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          exit "${rc}"

      - name: Run candidate runtime smoke test
        shell: bash
        run: |
          set -Eeuo pipefail
          log_file="${RUNNER_TEMP}/palworld-umu-runtime-smoke.log"
          set +e
          docker run --rm \
            --entrypoint /usr/local/bin/palworld-umu-smoke-test \
            "${LOCAL_IMAGE}" 2>&1 | tee "${log_file}"
          rc=${PIPESTATUS[0]}
          set -e
          {
            echo '## Candidate runtime smoke test'
            echo
            echo '```text'
            cat "${log_file}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          exit "${rc}"

      - name: Publish verified linux/amd64 image
        id: publish
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          provenance: mode=max
          sbom: true

      - name: Verify published image by digest
        env:
          IMAGE: ghcr.io/latukatv/palworld-umu-runtime@${{ steps.publish.outputs.digest }}
        run: |
          set -Eeuo pipefail
          docker pull "${IMAGE}"
          docker run --rm \
            --entrypoint /usr/local/bin/palworld-umu-image-preflight \
            "${IMAGE}"
          docker run --rm \
            --entrypoint /usr/local/bin/palworld-umu-smoke-test \
            "${IMAGE}"

      - name: Report runtime verification status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -Eeuo pipefail
          state="failure"
          description="Runtime build or verification failed"
          if [[ "${JOB_STATUS}" == "success" ]]; then
            state="success"
            description="Runtime image built, published and verified"
          fi
          payload="$(jq -nc \
            --arg state "${state}" \
            --arg description "${description}" \
            --arg context "palworld-umu-runtime/image" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,description:$description,context:$context,target_url:$target_url}')"
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
