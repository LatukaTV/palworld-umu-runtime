name: Build and publish runtime

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: runtime-${{ github.ref }}
  cancel-in-progress: true

env:
  LOCAL_IMAGE: palworld-umu-runtime:test-${{ github.sha }}

jobs:
  container:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/latukatv/palworld-umu-runtime
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Build local linux/amd64 candidate
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.LOCAL_IMAGE }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Run candidate runtime smoke test
        run: |
          set -Eeuo pipefail
          docker run --rm \
            --entrypoint /usr/local/bin/palworld-umu-smoke-test \
            "${LOCAL_IMAGE}"

      - name: Publish verified linux/amd64 image
        id: publish
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          provenance: mode=max
          sbom: true

      - name: Verify published image by digest
        env:
          IMAGE: ghcr.io/latukatv/palworld-umu-runtime@${{ steps.publish.outputs.digest }}
        run: |
          set -Eeuo pipefail
          docker pull "${IMAGE}"
          docker run --rm \
            --entrypoint /usr/local/bin/palworld-umu-smoke-test \
            "${IMAGE}"
