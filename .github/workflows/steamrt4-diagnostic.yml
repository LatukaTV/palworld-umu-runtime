name: steamrt4-diagnostic

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Pull and inspect SteamRT4 SDK
        run: |
          docker pull registry.gitlab.steamos.cloud/steamrt/steamrt4/sdk:latest >/dev/null
          docker image inspect registry.gitlab.steamos.cloud/steamrt/steamrt4/sdk:latest --format 'ARCH={{.Architecture}} USER={{.Config.User}} ENTRYPOINT={{json .Config.Entrypoint}} CMD={{json .Config.Cmd}}'
          docker run --rm --entrypoint /bin/bash registry.gitlab.steamos.cloud/steamrt/steamrt4/sdk:latest -lc '
            set -eu
            uname -m
            id
            cat /etc/os-release
            command -v apt-get
            command -v dpkg
            command -v getconf
            getconf GNU_LIBC_VERSION
            command -v useradd || true
          '
      - name: Build with concise failure output
        run: |
          set +e
          docker build --progress=plain --tag palworld-umu-runtime:diagnostic . >/tmp/build.log 2>&1
          rc=$?
          set -e
          if [ "${rc}" -ne 0 ]; then
            echo '=== LETZTE 160 BUILDZEILEN ==='
            tail -n 160 /tmp/build.log
            exit "${rc}"
          fi
          tail -n 40 /tmp/build.log
      - name: Publish diagnostic status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state=failure
          [ "${JOB_STATUS}" = success ] && state=success
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"${state}\",\"context\":\"steamrt4-diagnostic\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
