name: publish-verified-windows-mod

on:
  push:
    branches: [main, v0.2.9-windows-mod-platform]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/publish-verified-steamrt4.yml

permissions:
  contents: read
  packages: write
  statuses: write

concurrency:
  group: publish-verified-windows-mod-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      LOCAL_IMAGE: palworld-windows-mod-runtime:verified-${{ github.sha }}
      GHCR_IMAGE: ghcr.io/latukatv/palworld-umu-runtime
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build one local linux/amd64 candidate
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run image preflight
        run: docker run --rm --entrypoint /usr/local/bin/palworld-umu-image-preflight "${LOCAL_IMAGE}"

      - name: Run runtime smoke test
        run: |
          set +e
          docker run --rm --entrypoint /usr/local/bin/palworld-umu-smoke-test "${LOCAL_IMAGE}" > /tmp/runtime-smoke.log 2>&1
          rc=$?
          set -e
          cat /tmp/runtime-smoke.log
          exit "${rc}"

      - name: Upload runtime smoke log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: windows-mod-runtime-smoke-${{ github.sha }}
          path: /tmp/runtime-smoke.log
          if-no-files-found: error
          retention-days: 2

      - name: Push the verified local image
        run: |
          set -Eeuo pipefail
          for tag in "sha-${GITHUB_SHA}" windows-modded-wine; do
            docker tag "${LOCAL_IMAGE}" "${GHCR_IMAGE}:${tag}"
            docker push "${GHCR_IMAGE}:${tag}"
          done

      - name: Verify immutable published tag
        run: |
          set -Eeuo pipefail
          docker image rm "${GHCR_IMAGE}:sha-${GITHUB_SHA}" >/dev/null 2>&1 || true
          docker pull "${GHCR_IMAGE}:sha-${GITHUB_SHA}"
          docker run --rm --entrypoint /usr/local/bin/palworld-umu-image-preflight "${GHCR_IMAGE}:sha-${GITHUB_SHA}"
          docker run --rm --entrypoint /usr/local/bin/palworld-umu-start "${GHCR_IMAGE}:sha-${GITHUB_SHA}" --self-test

      - name: Publish commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state=failure
          [ "${JOB_STATUS}" = success ] && state=success
          description="Windows mod runtime verification ${JOB_STATUS}"
          if [ -s /tmp/runtime-smoke.log ]; then
            tail_line="$(tail -n 1 /tmp/runtime-smoke.log | tr -d '\r\n' | tr '"' "'" | cut -c1-120)"
            [ -z "${tail_line}" ] || description="${tail_line}"
          fi
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"${state}\",\"context\":\"palworld-windows-mod-runtime/verified-publish\",\"description\":\"${description}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
