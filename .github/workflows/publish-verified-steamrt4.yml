name: publish-verified-steamrt4

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/publish-verified-steamrt4.yml

permissions:
  contents: read
  packages: write
  statuses: write

concurrency:
  group: publish-verified-steamrt4-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      LOCAL_IMAGE: palworld-umu-runtime:verified-${{ github.sha }}
      GHCR_IMAGE: ghcr.io/latukatv/palworld-umu-runtime
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build one local linux/amd64 candidate
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run image preflight
        run: docker run --rm --entrypoint /usr/local/bin/palworld-umu-image-preflight "${LOCAL_IMAGE}"

      - name: Run runtime smoke test
        run: docker run --rm --entrypoint /usr/local/bin/palworld-umu-smoke-test "${LOCAL_IMAGE}"

      - name: Push the verified local image
        run: |
          set -Eeuo pipefail
          for tag in "sha-${GITHUB_SHA}" steamrt4-ge-proton11-1 latest; do
            docker tag "${LOCAL_IMAGE}" "${GHCR_IMAGE}:${tag}"
            docker push "${GHCR_IMAGE}:${tag}"
          done

      - name: Verify immutable published tag
        run: |
          set -Eeuo pipefail
          docker image rm "${GHCR_IMAGE}:sha-${GITHUB_SHA}" >/dev/null 2>&1 || true
          docker pull "${GHCR_IMAGE}:sha-${GITHUB_SHA}"
          docker run --rm --entrypoint /usr/local/bin/palworld-umu-image-preflight "${GHCR_IMAGE}:sha-${GITHUB_SHA}"
          docker run --rm --entrypoint /usr/local/bin/palworld-umu-start "${GHCR_IMAGE}:sha-${GITHUB_SHA}" --self-test

      - name: Publish commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state=failure
          [ "${JOB_STATUS}" = success ] && state=success
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"${state}\",\"context\":\"palworld-umu-runtime/verified-publish\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
